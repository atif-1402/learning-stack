<!DOCTYPE html>
<html>
    <head>
        <title>Popup</title>
        <style>
            .sm1 {
                width: 100px;
                font-size: 16px;
                padding: 8px 8px 8px 8px;
                border: 1px solid gray;
                border-radius: 6px;
            }

            .sm2 {
                width: 100px;
                font-size: 16px;
                padding: 8px 8px 8px 8px;
                margin-left: -6px;
                border: 1px solid gray;
                border-radius: 6px;
            }

            .big {
                display: block;
                width: 222px;
                font-size: 16px;
                padding: 8px 8px 8px 8px;
                border-radius: 6px;
                margin-top: 8px;
                border: 1px solid gray;
            }

            .log {
                width: 240px;
                font-size: 18px;
                font-weight: bold;
                margin-top: 7px;
                padding-top: 6px;
                padding-bottom: 6px;
                cursor: pointer;
                border-radius: 8px;
                border: none;
                background-color: #3c75e9;
                color: white;
            }

            .log:hover {
                opacity: 0.6;
            }

            .log:active {
                opacity: 0.8;
            }
        </style>
    </head>
    <body>
        <input class="sm1" type="text" placeholder="Frist name">
        <input class="sm2" type="text" placeholder="Last name">
        <input class="big" type="text" placeholder="Email">
        <button class="log">Sign Up</button>
    </body>
</html>
