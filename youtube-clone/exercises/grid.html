<!DOCTYPE html>
<html>
    <head>
        <title>Grid Practice</title>
    </head>
    <body>
        <div style="display: grid; grid-template-columns: 100px 100px;">
            <div style="background-color: pink;">
                Div 1
            </div>
            <div style="background-color: lightblue;">
                Div 2
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 100px 100px 200px; margin-top: 4px;">
            <div style="background-color: pink;">
                Div 1
            </div>
            <div style="background-color: lightblue;">
                Div 2
            </div>
            <div style="background-color: lightyellow;">
                Div 3 
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 100px 1fr; margin-top: 10px;">
            <div style="background-color: pink;">
                Div 1
            </div>
            <div style="background-color: lightblue;">
                Div 2
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 100px 1fr 1fr; margin-top: 10px;">
            <div style="background-color: lightyellow;">
                Div 3
            </div>
            <div style="background-color: pink;">
                Div 1
            </div>
            <div style="background-color: lightblue;">
                Div 2
            </div>
        </div>

        <div style="
        display: grid; 
        grid-template-columns: 1fr 1fr 1fr 1fr; 
        margin-top: 10px;
        column-gap: 8px;
        row-gap: 16px;">
            <div style="background-color: lightyellow; height: 100px;">
                Div 3
            </div>
            <div style="background-color: pink; height: 100px">
                Div 1
            </div>
            <div style="background-color: lightblue; height: 100px">
                Div 2
            </div>
            <div style="background-color: lightblue; height: 100px">
                Div 2
            </div>
            <div style="background-color: lightyellow; height: 100px;">
                Div 3
            </div>
            <div style="background-color: pink; height: 100px">
                Div 1
            </div>
            <div style="background-color: lightyellow; height: 100px;">
                Div 3
            </div>
            <div style="background-color: pink; height: 100px">
                Div 1
            </div>
        </div>
    </body>
</html>
